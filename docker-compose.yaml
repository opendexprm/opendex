services:
  traefik:
    image: traefik:3.7.0
    container_name: opendex-traefik
    restart: unless-stopped
    env_file: docker.env
    environment:
      - TRAEFIK_API_DASHBOARD=${TRAEFIK_DASHBOARD}
      - TRAEFIK_API_INSECURE=false
      - TRAEFIK_LOG_LEVEL=INFO
      - TRAEFIK_LOG_FILEPATH=/var/log/opendex/traefik.log
      - TRAEFIK_ACCESSLOG_FILEPATH=/var/log/opendex/traefik-access.log
      - TRAEFIK_ENTRYPOINTS_WEB_ADDRESS=:80
      - TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_TO=websecure
      - TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_SCHEME=https
      - TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS=:443
      - TRAEFIK_PROVIDERS_FILE_DIRECTORY=/etc/traefik/rules
      - TRAEFIK_PROVIDERS_FILE_WATCH=false
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_STORAGE=/data/acme.json
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_HTTPCHALLENGE_ENTRYPOINT=web
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./traefik/rules:/etc/traefik/rules:ro
      - ./data/traefik:/data
      - ./logs:/var/log/opendex
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - opendex

  postgres:
    image: postgres:18-alpine
    container_name: opendex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opendex
      POSTGRES_PASSWORD: opendex
      POSTGRES_DB: opendex
    volumes:
      - ./data/postgres:/var/lib/postgresql
      - ./logs:/var/log/opendex
    networks:
      - opendex

  radicale:
    build:
      context: .
      dockerfile: radicale/Dockerfile
    image: opendex-radicale:latest
    container_name: opendex-radicale
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RADICALE_DB_URL: postgresql+psycopg2://opendex:opendex@postgres:5432/opendex
    volumes:
      - ./radicale/config:/etc/radicale/config:ro
      - ./radicale/users:/etc/radicale/users:ro
      - ./logs:/var/log/opendex
    networks:
      - opendex

networks:
  opendex:
    name: opendex
