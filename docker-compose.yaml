services:
  traefik:
    image: traefik:3.7.0
    container_name: opendex-traefik
    restart: unless-stopped
    env_file: .env
    environment:
      - TRAEFIK_API_DASHBOARD=${TRAEFIK_DASHBOARD}
      - TRAEFIK_API_INSECURE=false
      - TRAEFIK_LOG_LEVEL=INFO
      - TRAEFIK_LOG_FILEPATH=/var/log/opendex/traefik.log
      - TRAEFIK_ACCESSLOG_FILEPATH=/var/log/opendex/traefik-access.log
      - TRAEFIK_ENTRYPOINTS_WEB_ADDRESS=:80
      - TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_TO=websecure
      - TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_SCHEME=https
      - TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS=:443
      - TRAEFIK_PROVIDERS_FILE_DIRECTORY=/etc/traefik/rules
      - TRAEFIK_PROVIDERS_FILE_WATCH=false
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_STORAGE=/data/acme.json
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_HTTPCHALLENGE_ENTRYPOINT=web
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./traefik/rules:/etc/traefik/rules:ro
      - ./data/traefik:/data
      - ./logs:/var/log/opendex
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - opendex

  postgres:
    image: postgres:18-alpine
    container_name: opendex-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: opendex
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        LOG=/var/log/opendex/postgres.log
        [ -f "$$LOG" ] && mv "$$LOG" "/var/log/opendex/postgres.$$(date +%Y%m%d_%H%M%S).log"
        exec docker-entrypoint.sh postgres 2>&1 | tee "$$LOG"
    volumes:
      - ./data/postgres:/var/lib/postgresql
      - ./logs:/var/log/opendex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - opendex

  radicale:
    build:
      context: .
      dockerfile: radicale/Dockerfile
    image: opendex-radicale:latest
    container_name: opendex-radicale
    restart: unless-stopped
    init: true             # run tini as PID 1 for proper signal forwarding and zombie reaping
    security_opt:
      - no-new-privileges:true  # prevent privilege escalation via setuid binaries after startup
    cap_drop:
      - ALL              # drop all default Linux capabilities; add back only what's needed below
    cap_add:
      - SETUID           # switch to radicale user (UID 1000) on startup
      - SETGID           # switch to radicale group on startup
      - CHOWN            # set ownership on collection files
      - KILL             # allow signal passing between tini and the radicale process
    deploy:
      resources:
        limits:
          memory: 512m
          pids: 50 # fork-bomb mitigation; radicale is single-threaded and needs far fewer
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opendex
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        LOG=/var/log/opendex/radicale.log
        [ -f "$$LOG" ] && mv "$$LOG" "/var/log/opendex/radicale.$$(date +%Y%m%d_%H%M%S).log"
        exec /app/bin/python /app/bin/radicale --hosts 0.0.0.0:5232 2>&1 | tee "$$LOG"
    volumes:
      - ./radicale/config:/etc/radicale/config:ro
      - ./radicale/users:/etc/radicale/users:ro
      - ./logs:/var/log/opendex
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5232')\""]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - opendex

  frontend:
    build: ./frontend
    image: opendex-frontend:latest
    container_name: opendex-frontend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opendex
      WEB_UI_PASSWORD: ${WEB_UI_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - opendex

networks:
  opendex:
    name: opendex
