services:
  traefik:
    image: traefik:3.7.0
    container_name: opendex-traefik
    restart: unless-stopped
    env_file: docker.env
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./traefik/rules:/etc/traefik/rules:ro
      - ./data/traefik:/data
      - ./logs:/var/log/opendex
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - opendex

  postgres:
    container_name: opendex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opendex
      POSTGRES_PASSWORD: opendex
      POSTGRES_DB: opendex
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./logs:/var/log/opendex
    networks:
      - opendex

  radicale:
    build:
      context: .
      dockerfile: radicale/Dockerfile
    image: opendex-radicale:latest
    container_name: opendex-radicale
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RADICALE_DB_URL: postgresql+psycopg2://opendex:opendex@postgres:5432/opendex
    volumes:
      - ./radicale/config:/etc/radicale/config:ro
      - ./radicale/users:/etc/radicale/users:ro
      - ./logs:/var/log/opendex
    networks:
      - opendex

  bifrost:
    image: maximhq/bifrost:v1.5.0
    container_name: opendex-bifrost
    restart: unless-stopped
    networks:
      - opendex

networks:
  opendex:
    name: opendex
