# Radicale at radicale.<DOMAIN>

http:
  routers:
    radicale:
      rule: "Host(`radicale.{{ env "DOMAIN" }}`)"
      service: radicale
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

  services:
    radicale:
      loadBalancer:
        servers:
          - url: "http://opendex-radicale:5232"
