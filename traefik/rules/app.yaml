# {DOMAIN} -> Next.js frontend (includes API route handlers)

http:
  routers:
    app:
      rule: 'Host(`{{ env "DOMAIN" }}`)'
      service: app
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

  services:
    app:
      loadBalancer:
        servers:
          - url: "http://opendex-frontend:3000"
